<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="cad.maqui.js"defer></script>
    <title>Document</title>
</head>
<body>
    <label for="nome">Digite o nome do maquinário</label><br>
    <input type="text" id="nome"><br>
    <label for="marca">Digite a marca do maquinário</label><br>
    <input type="text" id="marca"><br>
    <label for="ano">Digite o ano do maquinário</label><br>
    <input type="text" id="ano"><br>
    <label for="tipo">Selecione o tipo do seu maquinário</label><br>
    <select id="tipo">
        <option value="pequeno">Pequeno</option>
        <option value="medio">Médio</option>
        <option value="grande">Grande</option>
    </select><br>
    <label for="precoCusto">Digite o preço de custo do maquinário</label><br>
    <input type="text" id="precoCusto"><br>
    <button btnCadastrar>Cadastrar</button>
    <div id="resposta"></div>
</body>
</html>
